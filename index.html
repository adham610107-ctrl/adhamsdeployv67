<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayt vaqtincha to'xtatildi</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Orqa fon rasmi */
            background-image: url('bckgrnd.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f0f0f0; /* Agar rasm ochilmasa, shu rang chiqadi */
            
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }

        /* Asosiy ma'lumot oynasi */
        .container {
            background: rgba(255, 255, 255, 0.9); /* Orqa fonni biroz ko'rsatadigan shaffof oq */
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #e74c3c;
            margin-bottom: 20px;
            font-size: 28px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #555;
        }

        .actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        /* Telegram rasm-linki */
        .telegram-link {
            display: inline-block;
        }

        .telegram-link img {
            width: 60px; /* Ikonka kattaligi */
            height: 60px;
            transition: transform 0.3s ease;
        }

        .telegram-link img:hover {
            transform: scale(1.1); /* Sishqoncha borganda kattalashishi */
        }

        /* Yangi saytga o'tish tugmasi */
        .btn {
            display: inline-block;
            padding: 14px 30px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            border-radius: 8px;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Texnik Xizmat</h1>
        <p>
            Sayt texnik sabablarga ko'ra vaqtincha to'xtatildi. Iltimos, bu haqida to'liq ma'lumotni bilmoqchi bo'lsangiz, admin bilan bog'laning.
        </p>

        <div class="actions">
            <!-- Telegram admin linki -->
            <a href="https://t.me/adhamstg" class="telegram-link" target="_blank" title="Admin bilan bog'lanish">
                <img src="tlgrm.png" alt="Telegram orqali bog'lanish">
            </a>

            <!-- Yangi saytga yo'naltirish tugmasi -->
            <a href="https://sanatshunoslikmutdaktestlar.netlify.app/" class="btn">Yangi saytga o'tish</a>
        </div>
    </div>

</body>
</html>
